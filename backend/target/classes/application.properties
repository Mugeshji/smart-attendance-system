# ==============================
# SERVER
# ==============================
server.port=8080

# ==============================
# DATABASE (PostgreSQL)
# ==============================
# Render will inject these environment variables automatically.
# If not present, Spring Boot will use the local PostgreSQL defaults.

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/smart_attendance}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==============================
# JPA / HIBERNATE
# ==============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ==============================
# JWT CONFIG
# ==============================
jwt.secret=SmartAttendanceIoTPlatformSuperSecretKeyForJWTTokenGeneration2024!@#$%^&*
jwt.expiration=86400000

# ==============================
# FILE UPLOAD
# ==============================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ==============================
# CORS
# ==============================
# Render will automatically replace this with the frontend URL
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}