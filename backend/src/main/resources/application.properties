# Server
server.port=8080

# Database Settings (Environment Variables for Render, Defaults for Local)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/smart_attendance}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
# Driver and Dialect are auto-detected by Spring Boot based on the URL (MySQL vs PostgreSQL)

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=SmartAttendanceIoTPlatformSuperSecretKeyForJWTTokenGeneration2024!@#$%^&*
jwt.expiration=86400000

# File upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# CORS (Allow local and Render frontend URLs)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
