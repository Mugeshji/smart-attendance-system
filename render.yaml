services:
  # 1. PostgreSQL Database
  - type: postgres
    name: smart-attendance-db
    plan: free
    ipAllowList: [] # Allows internal connections from other Render services automatically

  # 2. Spring Boot Backend
  - type: web
    name: smart-attendance-api
    plan: free
    env: docker
    rootDir: backend
    dockerfilePath: Dockerfile
    envVars:
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: smart-attendance-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: smart-attendance-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: smart-attendance-db
          property: password
      - key: CORS_ALLOWED_ORIGINS
        # The URL Render dynamically assigns to the frontend Service below
        fromService:
          type: web
          name: smart-attendance-ui
          envVarKey: RENDER_EXTERNAL_URL

  # 3. React Frontend
  - type: web
    name: smart-attendance-ui
    plan: free
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        # The URL Render dynamically assigns to the backend Service above
        fromService:
          type: web
          name: smart-attendance-api
          envVarKey: RENDER_EXTERNAL_URL
